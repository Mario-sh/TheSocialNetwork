<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheSocialNetwork</title>
    <!-- Mise a jour du style -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading {
            text-align: center;
            color: #1A6FBF;
        }

        .loading h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .loading p {
            color: #666;
            font-size: 14px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #1A6FBF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Affiché pendant la vérification de la session -->
    <div class="loading">
        <h2>TheSocialNetwork</h2>
        <div class="spinner"></div>
        <p>Chargement...</p>
    </div>

    <!-- On charge utils.js en premier — contient estConnecte() -->
    <script src="assets/js/utils.js"></script>

    <script>
        // Point d'entrée de l'application
        // Vérifie si l'utilisateur est connecté et redirige

        // estConnecte() vérifie si un token existe dans sessionStorage
        if (estConnecte()) {
            // Utilisateur connecté → page d'accueil
            window.location.href = 'vues/clients/accueil.html';
        } else {
            // Utilisateur non connecté → page de login
            window.location.href = 'vues/clients/login.html';
        }
    </script>

</body>

</html>
