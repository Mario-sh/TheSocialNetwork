<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #F0F2F5;
            min-height: 100vh;
            color: #1C1E21;
        }

        /* ── SIDEBAR ADMIN ───────────────────────── */
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #1C1E21;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 20px 16px;
            border-bottom: 1px solid #333;
        }

        .sidebar-logo h1 {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .sidebar-logo span {
            font-size: 11px;
            color: #8A8D91;
            font-weight: 500;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            color: #8A8D91;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Inter', Arial, sans-serif;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: #333;
            color: #fff;
        }

        .nav-item.active {
            background: #1877F2;
            color: #fff;
        }

        .sidebar-footer {
            padding: 16px 8px;
            border-top: 1px solid #333;
        }

        .admin-info {
            padding: 10px 12px;
            margin-bottom: 8px;
        }

        .admin-name {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .admin-role {
            font-size: 11px;
            color: #8A8D91;
            margin-top: 2px;
        }

        /* ── CONTENU PRINCIPAL ───────────────────── */
        .main-content {
            margin-left: 240px;
            flex: 1;
            padding: 24px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: #1C1E21;
            margin-bottom: 24px;
        }

        /* ── CARTES STATS ────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: #8A8D91;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1C1E21;
            line-height: 1;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
        }

        .icon-blue {
            background: #E7F3FF;
            color: #1877F2;
        }

        .icon-green {
            background: #E1F5EE;
            color: #0E8A5F;
        }

        .icon-orange {
            background: #FFF3E0;
            color: #E65100;
        }

        .icon-purple {
            background: #EEEDFE;
            color: #5B4FE8;
        }

        /* ── TABLEAU RÉCENTS ─────────────────────── */
        .section-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .section-header {
            padding: 16px 20px;
            border-bottom: 1px solid #E4E6EB;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-header h2 {
            font-size: 16px;
            font-weight: 700;
            color: #1C1E21;
        }

        .btn-voir-tout {
            font-size: 13px;
            font-weight: 600;
            color: #1877F2;
            text-decoration: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 12px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #8A8D91;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #F9FAFB;
            border-bottom: 1px solid #E4E6EB;
        }

        td {
            padding: 14px 20px;
            font-size: 14px;
            color: #1C1E21;
            border-bottom: 1px solid #F0F2F5;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #F9FAFB;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-admin {
            background: #EEEDFE;
            color: #5B4FE8;
        }

        .badge-modo {
            background: #E7F3FF;
            color: #1877F2;
        }

        .badge-user {
            background: #F0F2F5;
            color: #606770;
        }

        /* ── RESPONSIVE ──────────────────────────── */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-left: 200px;
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                display: none;
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h1>TheSocialNetwork</h1>
                <span>Administration</span>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
                    </svg>
                    Dashboard
                </a>
                <a href="utilisateurs.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
                    </svg>
                    Utilisateurs
                </a>
                <a href="articles.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
                    </svg>
                    Articles
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="admin-info">
                    <div class="admin-name" id="admin-name">...</div>
                    <div class="admin-role" id="admin-role">...</div>
                </div>
                <button class="nav-item" onclick="deconnecter()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
                    </svg>
                    Déconnexion
                </button>
            </div>
        </aside>

        <!-- CONTENU -->
        <main class="main-content">
            <div class="page-title">Dashboard</div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon icon-blue">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
                        </svg>
                    </div>
                    <div class="stat-label">Utilisateurs</div>
                    <div class="stat-value" id="stat-users">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
                        </svg>
                    </div>
                    <div class="stat-label">Publications</div>
                    <div class="stat-value" id="stat-posts">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-orange">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                        </svg>
                    </div>
                    <div class="stat-label">Messages</div>
                    <div class="stat-value" id="stat-messages">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-purple">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                        </svg>
                    </div>
                    <div class="stat-label">Réactions</div>
                    <div class="stat-value" id="stat-reactions">—</div>
                </div>
            </div>

            <!-- Derniers utilisateurs -->
            <div class="section-card">
                <div class="section-header">
                    <h2>Derniers utilisateurs inscrits</h2>
                    <a href="utilisateurs.html" class="btn-voir-tout">Voir tout</a>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Rôle</th>
                            <th>Inscrit le</th>
                        </tr>
                    </thead>
                    <tbody id="table-users">
                        <tr>
                            <td colspan="4" style="text-align:center;color:#8A8D91">Chargement...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Derniers articles -->
            <div class="section-card">
                <div class="section-header">
                    <h2>Dernières publications</h2>
                    <a href="articles.html" class="btn-voir-tout">Voir tout</a>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Auteur</th>
                            <th>Contenu</th>
                            <th>Publié le</th>
                        </tr>
                    </thead>
                    <tbody id="table-posts">
                        <tr>
                            <td colspan="3" style="text-align:center;color:#8A8D91">Chargement...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        // Vérification connexion admin
        const user = getUser();
        if (!user || (user.role !== 'administrateur' && user.role !== 'moderateur')) {
            window.location.href = 'login.html';
        }

        // Afficher les infos admin
        document.getElementById('admin-name').textContent = user.prenom + ' ' + user.nom;
        document.getElementById('admin-role').textContent = user.role === 'administrateur' ? 'Administrateur' : 'Modérateur';

        // Charger les statistiques
        async function chargerStats() {
            const result = await apiCall('../../api/admin/get_stats.php', 'GET');

            if (result.success) {
                document.getElementById('stat-users').textContent = result.stats.utilisateurs;
                document.getElementById('stat-posts').textContent = result.stats.publications;
                document.getElementById('stat-messages').textContent = result.stats.messages;
                document.getElementById('stat-reactions').textContent = result.stats.reactions;

                // Remplir le tableau des derniers utilisateurs
                document.getElementById('table-users').innerHTML = result.stats.derniers_users.map(u => `
                <tr>
                    <td>${u.prenom} ${u.nom}</td>
                    <td>${u.email}</td>
                    <td><span class="badge badge-${u.role === 'administrateur' ? 'admin' : u.role === 'moderateur' ? 'modo' : 'user'}">${u.role}</span></td>
                    <td>${formaterDate(u.cree_le)}</td>
                </tr>
            `).join('');

                // Remplir le tableau des derniers articles
                document.getElementById('table-posts').innerHTML = result.stats.derniers_posts.map(p => `
                <tr>
                    <td>${p.prenom} ${p.nom}</td>
                    <td>${p.contenu.substring(0, 60)}${p.contenu.length > 60 ? '...' : ''}</td>
                    <td>${formaterDate(p.cree_le)}</td>
                </tr>
            `).join('');
            }
        }

        chargerStats();
    </script>

</body>

</html>
