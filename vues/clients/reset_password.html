<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — TheSocialNetwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: url('../../assets/images/backgroundauth.jpg') center/cover no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1877F2;
        }

        .logo p {
            font-size: 14px;
            color: #606770;
            margin-top: 6px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #606770;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #E4E6EB;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', Arial, sans-serif;
            outline: none;
            color: #1C1E21;
            transition: border 0.15s;
        }

        .form-group input:focus {
            border-color: #1877F2;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #1877F2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            transition: background 0.15s;
        }

        .btn:hover {
            background: #166FE5;
        }

        .btn:disabled {
            background: #BCC0C4;
            cursor: not-allowed;
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .message.success {
            background: #E1F5EE;
            color: #0E8A5F;
            border: 1px solid #B8E8D4;
        }

        .message.error {
            background: #FAECE7;
            color: #C0431A;
            border: 1px solid #F0C8B8;
        }

        .token-error {
            text-align: center;
            padding: 24px;
            color: #C0431A;
            font-size: 14px;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #606770;
        }

        .links a {
            color: #1877F2;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">
            <h1>TheSocialNetwork</h1>
            <p>Choisissez un nouveau mot de passe<br>pour votre compte.</p>
        </div>

        <!-- Zone d'erreur si token invalide -->
        <div class="token-error" id="token-error" style="display:none">
            Ce lien est invalide ou a expiré.<br>
            <a href="forgot_password.html" style="color:#1877F2;font-weight:600">Demander un nouveau lien</a>
        </div>

        <!-- Formulaire (caché si token invalide) -->
        <div id="form-zone">
            <div class="message" id="message"></div>

            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" id="mdp-nouveau" placeholder="Minimum 6 caractères">
            </div>

            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" id="mdp-confirm" placeholder="Répéter le mot de passe"
                    onkeydown="if(event.key==='Enter') reinitialiser()">
            </div>

            <button class="btn" id="btn" onclick="reinitialiser()">
                Changer le mot de passe
            </button>
        </div>

        <div class="links">
            <a href="login.html">Retour à la connexion</a>
        </div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        // ── Récupérer le token dans l'URL ─────────────────────────
        // Quand l'utilisateur clique sur le lien dans son email
        // L'URL ressemble à : reset_password.html?token=abc123xyz
        // On extrait le token avec URLSearchParams
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        // Si pas de token dans l'URL → afficher erreur
        if (!token) {
            document.getElementById('form-zone').style.display = 'none';
            document.getElementById('token-error').style.display = 'block';
        }

        // ── Réinitialiser le mot de passe ─────────────────────────
        async function reinitialiser() {
            const mdp_nouveau = document.getElementById('mdp-nouveau').value.trim();
            const mdp_confirm = document.getElementById('mdp-confirm').value.trim();

            if (!mdp_nouveau || !mdp_confirm) {
                afficherMessage('Tous les champs sont obligatoires', 'error');
                return;
            }

            if (mdp_nouveau.length < 6) {
                afficherMessage('Le mot de passe doit faire au moins 6 caractères', 'error');
                return;
            }

            if (mdp_nouveau !== mdp_confirm) {
                afficherMessage('Les mots de passe ne correspondent pas', 'error');
                return;
            }

            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.textContent = 'Modification en cours...';

            // Envoie le token + nouveau mot de passe à PHP
            const result = await apiCall('../../api/auth/reset_password.php', 'POST', {
                token,
                mdp_nouveau
            });

            if (result.success) {
                afficherMessage(
                    'Mot de passe changé avec succès ! Redirection...',
                    'success'
                );
                // Cache le formulaire
                document.getElementById('form-zone').style.display = 'none';
                // Redirige vers login après 2 secondes
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                afficherMessage(result.message || 'Lien invalide ou expiré', 'error');
                btn.disabled = false;
                btn.textContent = 'Changer le mot de passe';
            }
        }

        function afficherMessage(texte, type) {
            const msg = document.getElementById('message');
            msg.textContent = texte;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }
    </script>

</body>

</html>
