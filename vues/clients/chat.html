<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — TheSocialNetwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #F0F2F5;
            min-height: 100vh;
            color: #1C1E21;
        }

        /* ── NAVBAR ─────────────────────────────── */
        .navbar {
            background: #fff;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1877F2;
            text-decoration: none;
        }

        .nav-center {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            color: #606770;
            transition: background 0.15s;
        }

        .nav-link:hover {
            background: #F0F2F5;
            color: #1877F2;
        }

        .nav-link.active {
            color: #1877F2;
            border-bottom: 3px solid #1877F2;
            border-radius: 0;
        }

        .btn-logout {
            background: #F0F2F5;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #606770;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
        }

        /* ── LAYOUT CHAT ─────────────────────────── */
        .chat-layout {
            display: flex;
            height: calc(100vh - 56px);
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* ── SIDEBAR ─────────────────────────────── */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            border-right: 1px solid #E4E6EB;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #E4E6EB;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            color: #1C1E21;
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            background: #F0F2F5;
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 14px;
            font-family: 'Inter', Arial, sans-serif;
            outline: none;
            color: #1C1E21;
        }

        .search-input::placeholder {
            color: #8A8D91;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .conv-item:hover {
            background: #F0F2F5;
        }

        .conv-item.active {
            background: #E7F3FF;
        }

        .conv-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1877F2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .conv-info {
            flex: 1;
            min-width: 0;
        }

        .conv-name {
            font-size: 14px;
            font-weight: 600;
            color: #1C1E21;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-last {
            font-size: 12px;
            color: #8A8D91;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-unread {
            background: #1877F2;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            border-radius: 10px;
            padding: 2px 7px;
            flex-shrink: 0;
        }

        /* ── ZONE DE CONVERSATION ────────────────── */
        .chat-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* Écran vide quand aucune conv sélectionnée */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8A8D91;
            gap: 8px;
        }

        .chat-empty svg {
            opacity: 0.3;
        }

        .chat-empty p {
            font-size: 15px;
            font-weight: 500;
        }

        /* Header de la conversation */
        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid #E4E6EB;
            display: flex;
            align-items: center;
            gap: 10px;
            display: none;
        }

        .chat-header-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #1877F2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
        }

        .chat-header-name {
            font-size: 15px;
            font-weight: 700;
            color: #1C1E21;
        }

        /* Messages */
        .messages-zone {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            display: none;
        }

        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .message-row.moi {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #1877F2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .msg-bubble {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-row.moi .msg-bubble {
            background: #1877F2;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message-row.autre .msg-bubble {
            background: #F0F2F5;
            color: #1C1E21;
            border-bottom-left-radius: 4px;
        }

        .msg-image {
            max-width: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        /* Zone de saisie */
        .chat-input-zone {
            padding: 12px 16px;
            border-top: 1px solid #E4E6EB;
            display: flex;
            align-items: center;
            gap: 8px;
            display: none;
        }

        .chat-input {
            flex: 1;
            background: #F0F2F5;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            font-family: 'Inter', Arial, sans-serif;
            outline: none;
            color: #1C1E21;
        }

        .chat-input:focus {
            background: #E4E6EB;
        }

        .btn-image-upload {
            background: none;
            border: none;
            cursor: pointer;
            color: #1877F2;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.15s;
        }

        .btn-image-upload:hover {
            background: #E7F3FF;
        }

        .btn-send {
            background: #1877F2;
            color: #fff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: #166FE5;
        }

        /* ── BOTTOM NAV ──────────────────────────── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #E4E6EB;
            justify-content: space-around;
            align-items: center;
            height: 56px;
            z-index: 100;
            display: none;
        }

        .bottom-nav a,
        .bottom-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            font-weight: 500;
            color: #606770;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            gap: 2px;
        }

        .bottom-nav a.active {
            color: #1877F2;
        }

        /* ── RESPONSIVE ──────────────────────────── */
        @media (max-width: 600px) {
            .nav-center {
                display: none;
            }

            .chat-layout {
                height: calc(100vh - 56px - 56px);
                position: relative;
            }

            /* Sur mobile : la sidebar prend tout l'écran par défaut */
            .sidebar {
                width: 100%;
                display: flex;        /* visible par défaut sur mobile */
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                z-index: 10;
            }

            /* Quand une conversation est ouverte, sidebar est cachée */
            .sidebar.hidden {
                display: none;
            }

            /* Zone chat prend tout l'écran quand ouverte */
            .chat-zone {
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                z-index: 10;
                display: none;
            }

            .chat-zone.visible {
                display: flex;
            }

            /* Bouton retour visible seulement sur mobile */
            .btn-back-mobile {
                display: flex !important;
            }

            .bottom-nav {
                display: flex !important;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="accueil.html" class="logo">TheSocialNetwork</a>
        <div class="nav-center">
            <a href="accueil.html" class="nav-link">Accueil</a>
            <a href="amis.html" class="nav-link">Amis</a>
            <a href="profil.html" class="nav-link">Profil</a>
            <a href="chat.html" class="nav-link active">Messages</a>
        </div>
        <button class="btn-logout" onclick="deconnecter()">Déconnexion</button>
    </nav>

    <!-- LAYOUT CHAT -->
    <div class="chat-layout">

        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Messages</div>
                <input type="text" class="search-input" id="search-ami" placeholder="Rechercher un ami..."
                    oninput="rechercherAmis(this.value)">
            </div>
            <div class="conversations-list" id="conversations-list">
                <div style="padding:20px;text-align:center;color:#8A8D91;font-size:13px">
                    Chargement...
                </div>
            </div>
        </div>

        <!-- ZONE CONVERSATION -->
        <div class="chat-zone" id="chat-zone">

            <!-- Écran vide -->
            <div class="chat-empty" id="chat-empty">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="#1877F2">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                </svg>
                <p>Sélectionnez une conversation</p>
                <span style="font-size:13px">ou recherchez un ami pour commencer</span>
            </div>

            <!-- Header conversation -->
            <div class="chat-header" id="chat-header">
                <!-- Bouton retour mobile -->
                <button class="btn-back-mobile" onclick="retourListe()" style="display:none;background:none;border:none;cursor:pointer;color:#1877F2;padding:4px 8px 4px 0;font-size:22px;line-height:1;" title="Retour">←</button>
                <div class="chat-header-avatar" id="chat-header-avatar">?</div>
                <div class="chat-header-name" id="chat-header-name">...</div>
            </div>

            <!-- Messages -->
            <div class="messages-zone" id="messages-zone"></div>

            <!-- Input -->
            <div class="chat-input-zone" id="chat-input-zone">
                <label class="btn-image-upload">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
                    </svg>
                    <input type="file" id="input-image" accept="image/*" style="display:none" onchange="envoyerImage()">
                </label>
                <input type="text" class="chat-input" id="chat-input" placeholder="Écrire un message..."
                    onkeydown="if(event.key==='Enter') envoyerMessage()">
                <button class="btn-send" onclick="envoyerMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <!-- BOTTOM NAV MOBILE -->
    <nav class="bottom-nav">
        <a href="accueil.html">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            Accueil
        </a>
        <a href="amis.html">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
            </svg>
            Amis
        </a>
        <a href="profil.html">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
            Profil
        </a>
        <a href="chat.html" class="active">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
            </svg>
            Messages
        </a>
        <button onclick="deconnecter()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
            </svg>
            Quitter
        </button>
    </nav>

    <script src="../../assets/js/utils.js"></script>
    <script>
        if (!estConnecte()) {
            window.location.href = 'login.html';
        }

        const user = getUser();
        let destinataire = null;  // L'ami avec qui on parle
        let intervalChat = null;  // Le setInterval pour rafraîchir

        // ── Charger les conversations ─────────────────────────────
        async function chargerConversations() {
            const result = await apiCall('../../api/chat/get_messages.php?type=conversations', 'GET');
            const liste = document.getElementById('conversations-list');

            if (result.success && result.conversations.length > 0) {
                liste.innerHTML = result.conversations.map(c => {
                    const initiale = c.prenom.charAt(0).toUpperCase();
                    const nonLus = c.non_lus > 0 ? `<span class="conv-unread">${c.non_lus}</span>` : '';
                    return `
                <div class="conv-item" id="conv-${c.id}" onclick="ouvrirConversation(${c.id}, '${c.prenom}', '${c.nom}')">
                    <div class="conv-avatar">${initiale}</div>
                    <div class="conv-info">
                        <div class="conv-name">${c.prenom} ${c.nom}</div>
                        <div class="conv-last">${c.dernier_message || 'Commencer une conversation'}</div>
                    </div>
                    ${nonLus}
                </div>`;
                }).join('');
            } else {
                liste.innerHTML = '<div style="padding:20px;text-align:center;color:#8A8D91;font-size:13px">Aucun ami pour l\'instant.<br>Ajoutez des amis pour commencer à discuter !</div>';
            }
        }

        // ── Rechercher un ami ─────────────────────────────────────
        async function rechercherAmis(query) {
            if (query.length < 2) {
                chargerConversations();
                return;
            }

            const result = await apiCall(`../../api/friends/get_friends.php?type=amis&search=${query}`, 'GET');
            const liste = document.getElementById('conversations-list');

            if (result.success && result.amis.length > 0) {
                liste.innerHTML = result.amis.map(a => {
                    const initiale = a.prenom.charAt(0).toUpperCase();
                    return `
                <div class="conv-item" onclick="ouvrirConversation(${a.id}, '${a.prenom}', '${a.nom}')">
                    <div class="conv-avatar">${initiale}</div>
                    <div class="conv-info">
                        <div class="conv-name">${a.prenom} ${a.nom}</div>
                        <div class="conv-last">Envoyer un message</div>
                    </div>
                </div>`;
                }).join('');
            } else {
                liste.innerHTML = '<div style="padding:20px;text-align:center;color:#8A8D91;font-size:13px">Aucun ami trouvé.</div>';
            }
        }

        // ── Ouvrir une conversation ───────────────────────────────
        function retourListe() {
            if (estMobile()) {
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('chat-zone').classList.remove('visible');
                if (intervalChat) clearInterval(intervalChat);
            }
        }

        function ouvrirConversation(ami_id, prenom, nom) {
            destinataire = { id: ami_id, prenom, nom };

            // Sur mobile : cacher sidebar, afficher zone chat
            if (estMobile()) {
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('chat-zone').classList.add('visible');
            }

            // Met à jour le header
            document.getElementById('chat-empty').style.display = 'none';
            document.getElementById('chat-header').style.display = 'flex';
            document.getElementById('messages-zone').style.display = 'flex';
            document.getElementById('chat-input-zone').style.display = 'flex';
            document.getElementById('chat-header-name').textContent = prenom + ' ' + nom;
            document.getElementById('chat-header-avatar').textContent = prenom.charAt(0).toUpperCase();

            // Active la conversation dans la sidebar
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            const convEl = document.getElementById('conv-' + ami_id);
            if (convEl) convEl.classList.add('active');

            // Charge les messages et démarre le rafraîchissement
            chargerMessages();
            if (intervalChat) clearInterval(intervalChat);
            intervalChat = setInterval(chargerMessages, 3000);
        }

        // ── Charger les messages ──────────────────────────────────
        async function chargerMessages() {
            if (!destinataire) return;

            const result = await apiCall(
                `../../api/chat/get_messages.php?destinataire_id=${destinataire.id}`, 'GET'
            );

            const zone = document.getElementById('messages-zone');

            if (result.success) {
                const wasAtBottom = zone.scrollHeight - zone.clientHeight <= zone.scrollTop + 50;

                zone.innerHTML = result.messages.map(m => {
                    const estMoi = m.expediteur_id === user.id;
                    const initiale = m.prenom.charAt(0).toUpperCase();
                    const contenu = m.image
                        ? `<img src="../../${m.image}" class="msg-image" alt="image">`
                        : m.contenu;

                    return `
                <div class="message-row ${estMoi ? 'moi' : 'autre'}">
                    ${!estMoi ? `<div class="msg-avatar">${initiale}</div>` : ''}
                    <div class="msg-bubble">${contenu}</div>
                </div>`;
                }).join('');

                // Scroll vers le bas si on y était déjà
                if (wasAtBottom) zone.scrollTop = zone.scrollHeight;
            }
        }

        // ── Envoyer un message texte ──────────────────────────────
        async function envoyerMessage() {
            if (!destinataire) return;

            const input = document.getElementById('chat-input');
            const contenu = input.value.trim();
            if (!contenu) return;

            input.value = '';

            await apiCall('../../api/chat/send_message.php', 'POST', {
                destinataire_id: destinataire.id,
                contenu
            });

            chargerMessages();
        }

        // ── Envoyer une image ─────────────────────────────────────
        async function envoyerImage() {
            if (!destinataire) return;

            const file = document.getElementById('input-image').files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('destinataire_id', destinataire.id);
            formData.append('image', file);

            await fetch('../../api/chat/send_message.php', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + getToken() },
                body: formData
            });

            chargerMessages();
            document.getElementById('input-image').value = '';
        }

        // ── Lancement ─────────────────────────────────────────────
        chargerConversations();
    </script>

</body>

</html>
