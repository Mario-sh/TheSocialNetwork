<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — TheSocialNetwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: url('../../assets/images/backgroundauth.jpg') center/cover no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1877F2;
        }

        .logo p {
            font-size: 14px;
            color: #606770;
            margin-top: 6px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #606770;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #E4E6EB;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', Arial, sans-serif;
            outline: none;
            color: #1C1E21;
            transition: border 0.15s;
        }

        .form-group input:focus {
            border-color: #1877F2;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #1877F2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            transition: background 0.15s;
        }

        .btn:hover {
            background: #166FE5;
        }

        .btn:disabled {
            background: #BCC0C4;
            cursor: not-allowed;
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .message.success {
            background: #E1F5EE;
            color: #0E8A5F;
            border: 1px solid #B8E8D4;
        }

        .message.error {
            background: #FAECE7;
            color: #C0431A;
            border: 1px solid #F0C8B8;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #606770;
        }

        .links a {
            color: #1877F2;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">
            <h1>TheSocialNetwork</h1>
            <p>Entrez votre email et nous vous enverrons<br>un lien pour réinitialiser votre mot de passe.</p>
        </div>

        <div class="message" id="message"></div>

        <div class="form-group">
            <label>Adresse email</label>
            <input type="email" id="email" placeholder="votre@email.com" onkeydown="if(event.key==='Enter') envoyer()">
        </div>

        <button class="btn" id="btn" onclick="envoyer()">
            Envoyer le lien
        </button>

        <div class="links">
            <a href="login.html">Retour à la connexion</a>
        </div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script>
        async function envoyer() {
            const email = document.getElementById('email').value.trim();

            if (!email) {
                afficherMessage('Veuillez entrer votre email', 'error');
                return;
            }

            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.textContent = 'Envoi en cours...';

            const result = await apiCall('../../api/auth/forgot_password.php', 'POST', { email });

            if (result.success) {
                afficherMessage(
                    'Si cet email existe, vous recevrez un lien de réinitialisation.',
                    'success'
                );
                document.getElementById('email').value = '';
            } else {
                afficherMessage(result.message || 'Une erreur est survenue', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Envoyer le lien';
        }

        function afficherMessage(texte, type) {
            const msg = document.getElementById('message');
            msg.textContent = texte;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }
    </script>

</body>

</html>
