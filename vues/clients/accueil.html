<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil — TheSocialNetwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #F0F2F5;
            min-height: 100vh;
            color: #1C1E21;
        }

        .navbar {
            background: #fff;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
        }

        .nav-left .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1877F2;
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .nav-center {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            color: #606770;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .nav-link:hover {
            background: #F0F2F5;
            color: #1877F2;
        }

        .nav-link.active {
            color: #1877F2;
            border-bottom: 3px solid #1877F2;
            border-radius: 0;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-user-name {
            font-size: 14px;
            font-weight: 600;
            color: #1C1E21;
        }

        .btn-logout {
            background: #F0F2F5;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #606770;
            cursor: pointer;
            transition: background 0.15s;
            font-family: 'Inter', Arial, sans-serif;
        }

        .btn-logout:hover {
            background: #E4E6EB;
            color: #1C1E21;
        }

        .main {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .create-post-card {
            background: #fff;
            border-radius: 10px;
            padding: 12px 16px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
        }

        .create-post-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .user-avatar-sm {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1877F2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .user-avatar-sm img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .create-post-input {
            flex: 1;
            background: #F0F2F5;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 15px;
            font-family: 'Inter', Arial, sans-serif;
            color: #606770;
            outline: none;
            width: 100%;
            resize: none;
            min-height: 40px;
            line-height: 1.4;
        }

        .create-post-input:focus {
            background: #E4E6EB;
            color: #1C1E21;
        }

        .create-post-divider {
            height: 1px;
            background: #E4E6EB;
            margin: 8px 0;
        }

        .create-post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-photo {
            cursor: pointer;
            font-size: 13px;
            color: #1877F2;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            font-family: 'Inter', Arial, sans-serif;
        }

        .btn-publish {
            background: #1877F2;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            transition: background 0.15s;
        }

        .btn-publish:hover {
            background: #166FE5;
        }

        .btn-publish:disabled {
            background: #BCC0C4;
            cursor: not-allowed;
        }

        .image-preview {
            margin-top: 8px;
            position: relative;
            display: none;
        }

        .image-preview img {
            max-height: 200px;
            border-radius: 8px;
            object-fit: cover;
            width: 100%;
        }

        .image-preview-remove {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px 8px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1877F2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-meta {
            flex: 1;
        }

        .post-author {
            font-size: 14px;
            font-weight: 600;
            color: #1C1E21;
        }

        .post-date {
            font-size: 12px;
            color: #8A8D91;
            margin-top: 1px;
        }

        .post-body {
            padding: 0 16px 12px;
            font-size: 15px;
            line-height: 1.6;
            color: #1C1E21;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
        }

        .post-stats {
            display: flex;
            justify-content: space-between;
            padding: 6px 16px;
            font-size: 13px;
            color: #8A8D91;
        }

        .post-actions-bar {
            display: flex;
            border-top: 1px solid #E4E6EB;
            padding: 4px 8px;
        }

        .btn-react {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px;
            border: none;
            background: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #606770;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            transition: background 0.15s;
        }

        .btn-react:hover {
            background: #F0F2F5;
        }

        .btn-react.liked {
            color: #1877F2;
        }

        .btn-react.disliked {
            color: #E41E3F;
        }

        .comments-section {
            border-top: 1px solid #E4E6EB;
            padding: 12px 16px;
            display: none;
        }

        .comment-item {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1877F2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .comment-bubble {
            background: #F0F2F5;
            border-radius: 18px;
            padding: 8px 12px;
            max-width: calc(100% - 44px);
        }

        .comment-author {
            font-size: 13px;
            font-weight: 600;
            color: #1C1E21;
        }

        .comment-text {
            font-size: 13px;
            color: #1C1E21;
            margin-top: 2px;
        }

        .comment-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .comment-field {
            flex: 1;
            background: #F0F2F5;
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            font-family: 'Inter', Arial, sans-serif;
            outline: none;
            color: #1C1E21;
        }

        .comment-field:focus {
            background: #E4E6EB;
        }

        .btn-send-comment {
            background: #1877F2;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            white-space: nowrap;
        }

        .empty-feed {
            text-align: center;
            padding: 48px 16px;
            color: #8A8D91;
            font-size: 15px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #E4E6EB;
            justify-content: space-around;
            align-items: center;
            height: 56px;
            z-index: 100;
            display: none;
        }

        .bottom-nav a,
        .bottom-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            font-weight: 500;
            color: #606770;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            gap: 2px;
        }

        .bottom-nav a.active {
            color: #1877F2;
        }

        @media (max-width: 600px) {
            .nav-center {
                display: none;
            }

            .nav-user-name {
                display: none;
            }

            .main {
                padding: 12px 8px 80px;
            }

            .bottom-nav {
                display: flex !important;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="accueil.html" class="logo">TheSocialNetwork</a>
        </div>
        <div class="nav-center">
            <a href="accueil.html" class="nav-link active">Accueil</a>
            <a href="amis.html" class="nav-link">Amis</a>
            <a href="profil.html" class="nav-link">Profil</a>
            <a href="chat.html" class="nav-link">Messages</a>
        </div>
        <div class="nav-right">
            <span class="nav-user-name" id="user-nom"></span>
            <button class="btn-logout" onclick="deconnecter()">Déconnexion</button>
        </div>
    </nav>

    <div class="main">

        <div class="create-post-card">
            <div class="create-post-top">
                <div class="user-avatar-sm" id="create-avatar">?</div>
                <textarea class="create-post-input" id="nouveau-post" placeholder="Quoi de neuf ?" rows="1"
                    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">
            </textarea>
            </div>
            <div class="image-preview" id="image-preview">
                <img id="image-preview-img" src="" alt="preview">
                <button class="image-preview-remove" onclick="supprimerImage()">✕</button>
            </div>
            <div class="create-post-divider"></div>
            <div class="create-post-actions">
                <label class="btn-photo">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
                        <path
                            d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
                    </svg>
                    Photo
                    <input type="file" id="post-image" accept="image/*" style="display:none"
                        onchange="previewImage(this)">
                </label>
                <button class="btn-publish" onclick="publierPost()">Publier</button>
            </div>
        </div>

        <div id="fil-actualite">
            <div class="empty-feed">Chargement des publications...</div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="accueil.html" class="active">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            Accueil
        </a>
        <a href="amis.html">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
            </svg>
            Amis
        </a>
        <a href="profil.html">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
            Profil
        </a>
        <a href="chat.html">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
            </svg>
            Messages
        </a>
        <button onclick="deconnecter()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
            </svg>
            Quitter
        </button>
    </nav>

    <script src="../../assets/js/utils.js"></script>
    <script>
        if (!estConnecte()) {
            window.location.href = 'login.html';
        }

        const user = getUser();
        if (user) {
            document.getElementById('user-nom').textContent = user.prenom + ' ' + user.nom;
            const createAvatar = document.getElementById('create-avatar');
            if (user.photo) {
                createAvatar.innerHTML = `<img src="../../${user.photo}" alt="avatar">`;
            } else {
                createAvatar.textContent = user.prenom.charAt(0).toUpperCase();
            }
        }

        // Prévisualise l'image sélectionnée
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('image-preview-img').src = e.target.result;
                    document.getElementById('image-preview').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Supprime l'image sélectionnée
        function supprimerImage() {
            document.getElementById('post-image').value = '';
            document.getElementById('image-preview').style.display = 'none';
            document.getElementById('image-preview-img').src = '';
        }

        async function chargerPosts() {
            const fil = document.getElementById('fil-actualite');
            const result = await apiCall('../../api/posts/get_posts.php', 'GET');

            if (result.success && result.posts.length > 0) {
                fil.innerHTML = result.posts.map(creerPostHTML).join('');
            } else {
                fil.innerHTML = '<div class="empty-feed">Aucune publication pour le moment.<br>Soyez le premier à publier !</div>';
            }
        }

        function creerPostHTML(post) {
            const initiale = post.prenom.charAt(0).toUpperCase();
            const imageHTML = post.image ? `<img src="../../${post.image}" class="post-image" alt="">` : '';
            const aLike = post.mon_reaction === 'like';
            const aDislike = post.mon_reaction === 'dislike';

            const avatarHTML = post.photo
                ? `<img src="../../${post.photo}" class="post-avatar" style="object-fit:cover;border-radius:50%;width:40px;height:40px;" alt="">`
                : `<div class="post-avatar">${initiale}</div>`;

            return `
        <div class="post-card" id="post-${post.id}">
            <div class="post-header">
                ${avatarHTML}
                <div class="post-meta">
                    <div class="post-author">${post.prenom} ${post.nom}</div>
                    <div class="post-date">${formaterDate(post.cree_le)}</div>
                </div>
            </div>
            ${post.contenu ? `<div class="post-body">${post.contenu}</div>` : ''}
            ${imageHTML}
            <div class="post-stats">
                <span id="stats-like-${post.id}">${post.likes} J'aime</span>
                <span id="stats-dislike-${post.id}">${post.dislikes} J'aime pas</span>
            </div>
            <div class="post-actions-bar">
                <button class="btn-react ${aLike ? 'liked' : ''}" id="btn-like-${post.id}" onclick="reagir(${post.id}, 'like')">J'aime</button>
                <button class="btn-react ${aDislike ? 'disliked' : ''}" id="btn-dislike-${post.id}" onclick="reagir(${post.id}, 'dislike')">J'aime pas</button>
                <button class="btn-react" onclick="toggleCommentaires(${post.id})">Commenter</button>
            </div>
            <div class="comments-section" id="comments-${post.id}">
                <div id="liste-comments-${post.id}"></div>
                <div class="comment-input-row">
                    <div class="comment-avatar">${initiale}</div>
                    <input type="text" class="comment-field" id="input-comment-${post.id}" placeholder="Écrire un commentaire..." onkeydown="if(event.key==='Enter') ajouterCommentaire(${post.id})">
                    <button class="btn-send-comment" onclick="ajouterCommentaire(${post.id})">Envoyer</button>
                </div>
            </div>
        </div>`;
        }

        async function publierPost() {
            const contenu = document.getElementById('nouveau-post').value.trim();
            const image = document.getElementById('post-image').files[0];

            if (!contenu && !image) return;

            const btn = document.querySelector('.btn-publish');
            btn.disabled = true;
            btn.textContent = 'Publication...';

            const formData = new FormData();
            formData.append('contenu', contenu);
            if (image) formData.append('image', image);

            const response = await fetch('../../api/posts/create_post.php', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + getToken() },
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                document.getElementById('nouveau-post').value = '';
                supprimerImage();
                chargerPosts();
            }

            btn.disabled = false;
            btn.textContent = 'Publier';
        }

        async function reagir(post_id, type) {
            const result = await apiCall('../../api/posts/like.php', 'POST', { post_id, type });

            if (result.success) {
                document.getElementById('stats-like-' + post_id).textContent = result.likes + " J'aime";
                document.getElementById('stats-dislike-' + post_id).textContent = result.dislikes + " J'aime pas";
                document.getElementById('btn-like-' + post_id).classList.toggle('liked', result.mon_reaction === 'like');
                document.getElementById('btn-dislike-' + post_id).classList.toggle('disliked', result.mon_reaction === 'dislike');
            }
        }

        async function toggleCommentaires(post_id) {
            const section = document.getElementById('comments-' + post_id);
            const visible = section.style.display === 'block';
            section.style.display = visible ? 'none' : 'block';
            if (!visible) chargerCommentaires(post_id);
        }

        async function chargerCommentaires(post_id) {
            const liste = document.getElementById('liste-comments-' + post_id);
            liste.innerHTML = '<p style="font-size:13px;color:#8A8D91;padding:4px 0">Chargement...</p>';

            const result = await apiCall('../../api/posts/get_comments.php?post_id=' + post_id, 'GET');

            if (result.success && result.commentaires.length > 0) {
                liste.innerHTML = result.commentaires.map(c => `
                <div class="comment-item">
                    <div class="comment-avatar">${c.prenom.charAt(0).toUpperCase()}</div>
                    <div class="comment-bubble">
                        <div class="comment-author">${c.prenom} ${c.nom}</div>
                        <div class="comment-text">${c.contenu}</div>
                    </div>
                </div>
            `).join('');
            } else {
                liste.innerHTML = '<p style="font-size:13px;color:#8A8D91;padding:4px 0">Aucun commentaire pour le moment.</p>';
            }
        }

        async function ajouterCommentaire(post_id) {
            const input = document.getElementById('input-comment-' + post_id);
            const contenu = input.value.trim();
            if (!contenu) return;

            const result = await apiCall('../../api/posts/add_comment.php', 'POST', { post_id, contenu });

            if (result.success) {
                input.value = '';
                chargerCommentaires(post_id);
            }
        }

        chargerPosts();
    </script>

</body>

</html>
